  name: Deploy to GitHub Pages

  on:
    push:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: pages
    cancel-in-progress: true

  jobs:
    deploy:
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Inject secrets into index.html
          env:
            SHEETS_ID: ${{ secrets.SHEETS_ID }}
            SHEETS_API_KEY: ${{ secrets.SHEETS_API_KEY }}
            EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
            EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
            EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          run: |
            sed -i "s|__SHEETS_ID__|${SHEETS_ID}|g" index.html
            sed -i "s|__SHEETS_API_KEY__|${SHEETS_API_KEY}|g" index.html
            sed -i "s|__EMAILJS_PUBLIC_KEY__|${EMAILJS_PUBLIC_KEY}|g" index.html
            sed -i "s|__EMAILJS_SERVICE_ID__|${EMAILJS_SERVICE_ID}|g" index.html
            sed -i "s|__EMAILJS_TEMPLATE_ID__|${EMAILJS_TEMPLATE_ID}|g"
  index.html

        - name: Setup Pages
          uses: actions/configure-pages@v5

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: .

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
