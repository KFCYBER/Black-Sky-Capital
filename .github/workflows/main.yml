  name: Deploy Dashboard

  on:
    push:
      branches: [main]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Inject secrets
          env:
            SHEETS_ID: ${{ secrets.SHEETS_ID }}
            SHEETS_API_KEY: ${{ secrets.SHEETS_API_KEY }}
            EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
            EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
            EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          run: |
            sed -i \
              -e "s|__SHEETS_ID__|${SHEETS_ID}|g" \
              -e "s|__SHEETS_API_KEY__|${SHEETS_API_KEY}|g" \
              -e "s|__EMAILJS_PUBLIC_KEY__|${EMAILJS_PUBLIC_KEY}|g" \
              -e "s|__EMAILJS_SERVICE_ID__|${EMAILJS_SERVICE_ID}|g" \
              -e "s|__EMAILJS_TEMPLATE_ID__|${EMAILJS_TEMPLATE_ID}|g" \
              index.html

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./
            publish_branch: gh-pages
